<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Details</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .detail-table { width: 100%; margin-top: 20px; }
        .detail-table th { width: 120px; text-align: right; padding: 10px; background: #f5f5f5; }
        .detail-table td { padding: 10px; }
        .btn { display: inline-block; padding: 8px 16px; margin: 10px 5px; text-decoration: none; border-radius: 4px; }
        .btn-edit { background: #ffc107; color: black; }
        .btn-back { background: #6c757d; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Employee Details</h1>
        
        <table class="detail-table">
            <tr>
                <th>ID:</th>
                <td th:text="${employee.id}">1</td>
            </tr>
            <tr>
                <th>Name:</th>
                <td th:text="${employee.fullName}">John Doe</td>
            </tr>
            <tr>
                <th>Email:</th>
                <td th:text="${employee.email}">john@example.com</td>
            </tr>
            <tr>
                <th>Department:</th>
                <td th:text="${employee.department}">IT</td>
            </tr>
            <tr>
                <th>Salary:</th>
                <td th:text="${'$' + employee.salary}">$75,000</td>
            </tr>
        </table>
        
        <div>
            <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-edit">Edit</a>
            <a th:href="@{/employees}" class="btn btn-back">Back to List</a>
        </div>
    </div>
</body>
</html>
