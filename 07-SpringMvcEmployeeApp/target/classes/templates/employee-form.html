<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${employee.id} ? 'Edit Employee' : 'Add Employee'">Employee Form</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-save { background: #007bff; color: white; }
        .btn-cancel { background: #6c757d; color: white; text-decoration: none; padding: 10px 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:text="${employee.id} ? 'Edit Employee' : 'Add New Employee'">Employee Form</h1>
        
        <form th:action="@{${employee.id} ? '/employees/' + ${employee.id} : '/employees'}" 
              th:object="${employee}" 
              method="post">
            
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" th:field="*{firstName}" required />
            </div>
            
            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" th:field="*{lastName}" required />
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" th:field="*{email}" required />
            </div>
            
            <div class="form-group">
                <label for="department">Department:</label>
                <select id="department" th:field="*{department}">
                    <option th:each="dept : ${departments}" 
                            th:value="${dept}" 
                            th:text="${dept}"
                            th:selected="${dept == employee.department}">
                    </option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="salary">Salary:</label>
                <input type="number" id="salary" th:field="*{salary}" step="0.01" required />
            </div>
            
            <div>
                <button type="submit" class="btn btn-save">Save</button>
                <a th:href="@{/employees}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
