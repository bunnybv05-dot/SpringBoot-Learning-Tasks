<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee List</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #007bff; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f5f5f5; }
        .btn { display: inline-block; padding: 8px 16px; margin: 2px; text-decoration: none; border-radius: 4px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-view { background: #17a2b8; color: white; }
        .btn-edit { background: #ffc107; color: black; }
        .btn-delete { background: #dc3545; color: white; border: none; cursor: pointer; }
        .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 4px; margin-bottom: 20px; }
        .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 4px; margin-bottom: 20px; }
        .filters { margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:text="${title} ?: 'Employee List'">Employee List</h1>
        
        <div th:if="${message}" class="success" th:text="${message}"></div>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <a th:href="@{/employees/new}" class="btn btn-primary">Add New Employee</a>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="emp : ${employees}">
                    <td th:text="${emp.id}">1</td>
                    <td th:text="${emp.fullName}">John Doe</td>
                    <td th:text="${emp.email}">john@example.com</td>
                    <td th:text="${emp.department}">IT</td>
                    <td th:text="${'$' + emp.salary}">$75,000</td>
                    <td>
                        <a th:href="@{/employees/{id}(id=${emp.id})}" class="btn btn-view">View</a>
                        <a th:href="@{/employees/edit/{id}(id=${emp.id})}" class="btn btn-edit">Edit</a>
                        <form th:action="@{/employees/delete/{id}(id=${emp.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-delete" 
                                    onclick="return confirm('Delete this employee?')">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="filters">
            <h3>Filter by Department:</h3>
            <a th:href="@{/employees/department/IT}">IT</a> |
            <a th:href="@{/employees/department/HR}">HR</a> |
            <a th:href="@{/employees/department/Finance}">Finance</a> |
            <a th:href="@{/employees/department/Marketing}">Marketing</a> |
            <a th:href="@{/employees}">All</a>
        </div>
    </div>
</body>
</html>
